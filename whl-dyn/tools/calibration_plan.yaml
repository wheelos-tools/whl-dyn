- case_name: throttle_20_to_1mps
  description: Accelerate with 20% throttle, target >1.0m/s, then brake to stop.
  steps:
  - command:
      throttle: 20.0
      brake: 0.0
    trigger:
      type: speed_greater_than
      value: 1.0
    timeout_sec: 30.0
  - command:
      throttle: 0.0
      brake: 30.0
    trigger:
      type: speed_less_than
      value: 0.1
    timeout_sec: 30.0
